<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BookEase - Admin Signup</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#e7eff3",
              "tertiary-container": "#dbdafb",
              "outline": "#707d82",
              "on-secondary-container": "#445367",
              "inverse-primary": "#dee8ff",
              "surface-container-high": "#dfeaef",
              "primary-dim": "#495365",
              "secondary": "#516075",
              "background": "#f7fafc",
              "inverse-on-surface": "#9a9d9f",
              "surface-container-low": "#eff4f7",
              "on-primary-fixed": "#364051",
              "surface-bright": "#f7fafc",
              "surface-variant": "#d7e5eb",
              "tertiary-fixed-dim": "#cdccec",
              "on-error": "#fff7f6",
              "tertiary-dim": "#50516c",
              "surface-container-lowest": "#ffffff",
              "surface-tint": "#555f71",
              "primary-fixed": "#d9e3f9",
              "on-tertiary-fixed": "#393953",
              "primary-container": "#d9e3f9",
              "secondary-fixed-dim": "#c6d5ee",
              "on-secondary-fixed-variant": "#4e5d71",
              "on-primary": "#f6f7ff",
              "error-container": "#fe8983",
              "secondary-container": "#d4e4fc",
              "on-secondary-fixed": "#324054",
              "error-dim": "#4e0309",
              "on-secondary": "#f7f9ff",
              "primary": "#555f71",
              "outline-variant": "#a7b4ba",
              "on-surface-variant": "#546166",
              "on-error-container": "#752121",
              "inverse-surface": "#0b0f10",
              "on-tertiary": "#fbf7ff",
              "surface": "#f7fafc",
              "on-surface": "#283439",
              "surface-container-highest": "#d7e5eb",
              "on-tertiary-fixed-variant": "#555571",
              "on-background": "#283439",
              "surface-dim": "#ccdde4",
              "on-tertiary-container": "#4c4c67",
              "on-primary-fixed-variant": "#525c6e",
              "error": "#9f403d",
              "primary-fixed-dim": "#cbd5eb",
              "secondary-fixed": "#d4e4fc",
              "tertiary": "#5d5d78",
              "secondary-dim": "#455468",
              "on-primary-container": "#485264",
              "tertiary-fixed": "#dbdafb"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #555F71 0%, #495365 100%);
        }
        .editorial-shadow {
            box-shadow: 0 8px 24px rgba(40, 52, 57, 0.06);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center">
<!-- Top Navigation Bar (Logo Anchor) -->
<header class="sticky top-0 z-50 w-full flex justify-center items-center px-6 h-16 bg-[#F7FAFC]/90 backdrop-blur-xl no-border tonal-shift-bg">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
<h1 class="text-xl font-extrabold tracking-tighter text-[#283439] font-headline">BookEase</h1>
</div>
</header>
<main class="w-full max-w-md px-6 pt-8 pb-12 overflow-y-auto">
<!-- Hero Header -->
<div class="mb-10 text-center">
<h2 class="text-[32px] font-extrabold font-headline leading-tight tracking-[-0.02em] text-on-surface mb-2">Create your account</h2>
<p class="text-on-surface-variant font-body">Join the Appointment Management System</p>
</div>
<!-- Auth Tabs -->
<div class="flex p-1 bg-surface-container-low rounded-full mb-10 editorial-shadow">
<button class="flex-1 py-2.5 text-sm font-semibold rounded-full text-on-surface-variant hover:bg-surface transition-colors">Log In</button>
<button class="flex-1 py-2.5 text-sm font-semibold rounded-full bg-surface-container-lowest text-primary shadow-sm">Sign Up</button>
</div>
<!-- Role Selection (Step 2 Preview Layout) -->
<div class="mb-10">
<label class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-4 px-1">Select Access Level</label>
<div class="grid grid-cols-1 gap-4">
<!-- Admin Access (Active State) -->
<button class="relative flex items-center p-4 bg-primary text-on-primary rounded-2xl transition-all border-2 border-primary text-left">
<div class="w-10 h-10 flex items-center justify-center bg-white/20 rounded-xl mr-4">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
</div>
<div class="flex-1">
<p class="text-sm font-bold font-headline">Admin Access</p>
<p class="text-xs opacity-80">Full organizational controls</p>
</div>
<span class="material-symbols-outlined text-on-primary">check_circle</span>
</button>
<!-- Offer Services -->
<button class="group flex items-center p-4 bg-surface-container-lowest text-on-surface rounded-2xl transition-all border-2 border-transparent hover:border-outline-variant/30 text-left editorial-shadow">
<div class="w-10 h-10 flex items-center justify-center bg-secondary-container text-on-secondary-container rounded-xl mr-4">
<span class="material-symbols-outlined">storefront</span>
</div>
<div class="flex-1">
<p class="text-sm font-bold font-headline">Offer Services</p>
<p class="text-xs text-on-surface-variant">Setup provider profile</p>
</div>
</button>
<!-- Book Appointments -->
<button class="group flex items-center p-4 bg-surface-container-lowest text-on-surface rounded-2xl transition-all border-2 border-transparent hover:border-outline-variant/30 text-left editorial-shadow">
<div class="w-10 h-10 flex items-center justify-center bg-tertiary-container text-on-tertiary-container rounded-xl mr-4">
<span class="material-symbols-outlined">person</span>
</div>
<div class="flex-1">
<p class="text-sm font-bold font-headline">Book Appointments</p>
<p class="text-xs text-on-surface-variant">Schedule for yourself</p>
</div>
</button>
</div>
</div>
<!-- Form Fields -->
<div class="space-y-5">
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant px-1" for="name">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border-2 border-outline-variant/15 rounded-xl focus:border-primary focus:ring-0 text-sm placeholder:text-outline/50 transition-all" id="name" placeholder="Enter your full name" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border-2 border-outline-variant/15 rounded-xl focus:border-primary focus:ring-0 text-sm placeholder:text-outline/50 transition-all" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant px-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border-2 border-outline-variant/15 rounded-xl focus:border-primary focus:ring-0 text-sm placeholder:text-outline/50 transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- CTA Action -->
<div class="mt-12">
<button class="w-full py-4 signature-gradient text-on-primary font-bold tracking-widest text-[11px] uppercase rounded-full editorial-shadow active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
<!-- Footer Links -->
<div class="mt-10 flex flex-col items-center gap-4">
<p class="text-sm text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
<div class="w-full flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="text-[10px] font-bold text-outline-variant uppercase tracking-widest">or</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<a class="flex items-center gap-2 px-6 py-2 rounded-full border border-outline-variant/30 text-xs font-semibold text-on-surface-variant hover:bg-surface-container-low transition-colors" href="#">
<span class="material-symbols-outlined text-[16px]">work</span>
                Join as a provider
            </a>
</div>
</main>
<!-- Visual Anchor / Decorative Element -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary-container/10 blur-[100px] -z-10 rounded-full"></div>
<div class="fixed top-1/4 -right-12 w-48 h-48 bg-secondary-container/20 blur-[80px] -z-10 rounded-full"></div>
</body></html>
